name: Build CamSpoof

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -q -y git curl xz-utils fakeroot dpkg-dev build-essential

      - name: Install ldid
        uses: MOZGIII/install-ldid-action@v1
        with:
          tag: v2.1.5-procursus2

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git /home/runner/theos

      - name: Install iOS Toolchain
        run: |
          curl -fsSL https://github.com/kabiroberai/swift-toolchain-linux/releases/download/v2.3.0/ios-toolchain-ubuntu22.tar.gz -o /tmp/toolchain.tar.gz
          tar -xzf /tmp/toolchain.tar.gz -C /home/runner/theos/toolchain/

      - name: Install SDK
        run: |
          SDK_URL=$(curl -s https://api.github.com/repos/theos/sdks/releases/latest \
            | grep "browser_download_url" \
            | grep "iPhoneOS16.5" \
            | cut -d '"' -f 4)
          echo "SDK URL: $SDK_URL"
          curl -fsSL "$SDK_URL" -o /tmp/sdk.tar.xz
          tar -xJf /tmp/sdk.tar.xz -C /home/runner/theos/sdks/

      - name: Build .deb
        run: |
          export THEOS=/home/runner/theos
          export THEOS_MAKE_PATH=$THEOS/makefiles
          export PATH="$THEOS/bin:$THEOS/toolchain/linux/iphone/bin:$PATH"
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: CamSpoof-deb
          path: packages/*.deb
          if-no-files-found: error
