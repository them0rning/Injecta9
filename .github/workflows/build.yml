- name: Build .deb
        run: |
          make package \
            THEOS=/home/runner/theos \
            FINALPACKAGE=1 \
            THEOS_PACKAGE_SCHEME=rootless

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: CamSpoof-deb
          path: packages/*.deb
          if-no-files-found: error
