name: Build CamSpoof

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -q -y git curl xz-utils fakeroot dpkg-dev build-essential

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git /home/runner/theos

      - name: Install SDK
        run: |
          curl -fsSL https://github.com/theos/sdks/releases/download/2023-11-23/iPhoneOS16.5.sdk.tar.xz -o /tmp/sdk.tar.xz
          tar -xJf /tmp/sdk.tar.xz -C /home/runner/theos/sdks/

      - name: Install ldid
        run: |
          curl -fsSL https://github.com/theos/ldid/releases/latest/download/ldid_linux-x86_64 -o /home/runner/theos/bin/ldid
          chmod +x /home/runner/theos/bin/ldid

      - name: Build .deb
        run: |
          export THEOS=/home/runner/theos
          export THEOS_MAKE_PATH=$THEOS/makefiles
          export PATH="$THEOS/bin:$PATH"
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless

      - name: Uplo
