name: Build CamSpoof

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -q -y \
            build-essential curl libxml2 xz-utils \
            zip git rsync fakeroot dpkg-dev

      - name: Cache Theos
        id: theos-cache
        uses: actions/cache@v4
        with:
          path: /opt/theos
          key: theos-linux-v5

      - name: Install Theos
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt/theos
          sudo chown $USER:$USER /opt/theos
          git clone --recursive https://github.com/theos/theos.git /opt/theos

      - name: Download iOS SDK
        run: |
          if [ ! -d /opt/theos/sdks/iPhoneOS16.5.sdk ]; then
            curl -fsSL \
              https://github.com/theos/sdks/releases/download/2024-09-06/iPhoneOS16.5.sdk.tar.xz \
              -o /tmp/sdk.tar.xz
            tar -xJf /tmp/sdk.tar.xz -C /opt/theos/sdks/
          fi

      - name: Install ldid
        run: |
          curl -fsSL \
            https://github.com/theos/ldid/releases/latest/download/ldid_linux-x86_64 \
            -o /opt/theos/bin/ldid
          chmod +x /opt/theos/bin/ldid

      - name: Build .deb
        run: |
          export THEOS=/opt/theos
          export PATH="$THEOS/bi
